{% extends 'navbar/studentnavbar.html' %}
{% load static %}

{% block title %}Change Password - Learnix{% endblock %}

{% block content %}
<div style="max-width: 500px; margin: 40px auto; background: var(--surface); border: 1px solid var(--surface-border); border-radius: 24px; padding: 40px; backdrop-filter: blur(24px); box-shadow: 0 20px 40px rgba(0,0,0,0.2);">
    <div style="text-align: center; margin-bottom: 30px;">
        <h2 style="font-size: 28px; font-weight: 700; background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px;">Change Password</h2>
        <p style="color: var(--muted); font-size: 15px;">Update your security credentials</p>
    </div>

    <form method="POST" action="{% url 'change_password' %}" style="display: flex; flex-direction: column; gap: 20px;">
        {% csrf_token %}
        
        <div class="input-group">
            <label style="display: block; color: var(--text-secondary); font-size: 14px; margin-bottom: 8px; font-weight: 500;">Current Password</label>
            <input type="password" name="current_password" required placeholder="••••••••"
                style="width: 100%; background: rgba(255, 255, 255, 0.03); border: 1px solid var(--surface-border); border-radius: 12px; padding: 14px 18px; color: var(--text); font-size: 15px; transition: all 0.3s ease; outline: none;">
        </div>

        <div class="input-group">
            <label style="display: block; color: var(--text-secondary); font-size: 14px; margin-bottom: 8px; font-weight: 500;">New Password</label>
            <input type="password" name="new_password" required placeholder="••••••••"
                style="width: 100%; background: rgba(255, 255, 255, 0.03); border: 1px solid var(--surface-border); border-radius: 12px; padding: 14px 18px; color: var(--text); font-size: 15px; transition: all 0.3s ease; outline: none;">
        </div>

        <div class="input-group">
            <label style="display: block; color: var(--text-secondary); font-size: 14px; margin-bottom: 8px; font-weight: 500;">Confirm New Password</label>
            <input type="password" name="confirm_password" required placeholder="••••••••"
                style="width: 100%; background: rgba(255, 255, 255, 0.03); border: 1px solid var(--surface-border); border-radius: 12px; padding: 14px 18px; color: var(--text); font-size: 15px; transition: all 0.3s ease; outline: none;">
        </div>

        <button type="submit" 
            style="margin-top: 10px; background: var(--accent); color: white; border: none; padding: 14px; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 12px var(--accent-glow);">
            Update Password
        </button>

        <a href="javascript:history.back()" style="text-align: center; color: var(--muted); text-decoration: none; font-size: 14px; font-weight: 500; transition: color 0.3s;">
            Cancel and Return
        </a>
    </form>
</div>

<style>
    input:focus {
        border-color: var(--accent) !important;
        background: rgba(255, 255, 255, 0.05) !important;
        box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1) !important;
    }
    
    button:hover {
        background: var(--accent-hover);
        transform: translateY(-2px);
        box-shadow: 0 8px 20px var(--accent-glow);
    }
</style>
{% endblock %}
