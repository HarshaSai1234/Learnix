{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Student Dashboard - Learnix{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/loginpage.css' %}">
    <link rel="stylesheet" href="{% static 'css/studenthomepage.css' %}">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--bg);
            background-image:
                radial-gradient(ellipse 100% 80% at 20% 0%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse 80% 60% at 80% 100%, rgba(99, 102, 241, 0.05) 0%, transparent 50%);
            transition: background 0.3s ease, color 0.3s ease;
        }

        header {
            width: 100%;
            padding: 20px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--surface);
            border-bottom: 1px solid var(--surface-border);
            backdrop-filter: blur(24px);
            transition: all 0.3s ease;
        }

        .logo {
            width: 5%;
            display: flex;
            padding: 0;
            margin: 0;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-info p {
            color: var(--text);
            font-weight: 500;
        }

        .theme-toggle {
            background: var(--surface-strong);
            border: 1px solid var(--surface-border);
            color: var(--text);
            width: 50px;
            height: 50px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .theme-toggle:hover {
            background: var(--accent);
            color: white;
            transform: scale(1.05);
        }

        .logout-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.3s;
        }

        .logout-btn:hover {
            background: var(--accent-hover);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .container {
            flex: 1;
            width: 100%;
            padding: 40px 60px;
            overflow-y: auto;
        }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
                padding: 15px 20px;
            }

            .container {
                padding: 20px;
            }

            .user-info {
                flex-direction: column;
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- Header/Navbar -->
    <header>
        <img class="logo" src="{% static 'logo.png' %}"></img>
        <div class="user-info">
            <p>Welcome, Student!</p>
            <button class="theme-toggle" id="themeToggle" title="Toggle dark/light mode">🌙</button>
            <button class="logout-btn" onclick="window.location.href='{% url 'loginpage' %}'">Logout</button>
        </div>
    </header>

    <div class="container">
        <!-- Content Block -->
        {% block content %}{% endblock %}
    </div>

    <script>
        // Theme toggle functionality
        const themeToggle = document.getElementById('themeToggle');
        const htmlElement = document.documentElement;

        // Check for saved theme preference or default to 'dark'
        const currentTheme = localStorage.getItem('theme') || 'dark';
        htmlElement.setAttribute('data-theme', currentTheme);
        updateThemeIcon(currentTheme);

        // Theme toggle event listener
        themeToggle.addEventListener('click', () => {
            const theme = htmlElement.getAttribute('data-theme');
            const newTheme = theme === 'dark' ? 'light' : 'dark';
            
            htmlElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeIcon(newTheme);
        });

        function updateThemeIcon(theme) {
            themeToggle.textContent = theme === 'dark' ? '☀️' : '🌙';
        }
    </script>
</body>
</html>
